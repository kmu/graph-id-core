<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Central node -->
  <circle cx="50" cy="50" r="12" fill="url(#grad)"/>
  <!-- Surrounding nodes -->
  <circle cx="25" cy="25" r="8" fill="#fbbf24"/>
  <circle cx="75" cy="25" r="8" fill="#fbbf24"/>
  <circle cx="25" cy="75" r="8" fill="#fbbf24"/>
  <circle cx="75" cy="75" r="8" fill="#fbbf24"/>
  <!-- Edges -->
  <line x1="50" y1="50" x2="25" y2="25" stroke="#94a3b8" stroke-width="2"/>
  <line x1="50" y1="50" x2="75" y2="25" stroke="#94a3b8" stroke-width="2"/>
  <line x1="50" y1="50" x2="25" y2="75" stroke="#94a3b8" stroke-width="2"/>
  <line x1="50" y1="50" x2="75" y2="75" stroke="#94a3b8" stroke-width="2"/>
  <line x1="25" y1="25" x2="75" y2="25" stroke="#94a3b8" stroke-width="2"/>
  <line x1="75" y1="25" x2="75" y2="75" stroke="#94a3b8" stroke-width="2"/>
  <line x1="75" y1="75" x2="25" y2="75" stroke="#94a3b8" stroke-width="2"/>
  <line x1="25" y1="75" x2="25" y2="25" stroke="#94a3b8" stroke-width="2"/>
</svg>
