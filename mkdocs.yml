site_name: Graph ID Documentation
site_description: Universal identifier system for atomistic structures
site_url: https://kmu.github.io/graph-id-core/
repo_url: https://github.com/kmu/graph-id-core
repo_name: kmu/graph-id-core
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/favicon.png

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [".", "docs/_stubs"]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            heading_level: 2
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kmu/graph-id-core
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/graph-id-core/
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Basic Usage: user-guide/basic-usage.md
    - Advanced Configuration: user-guide/advanced-configuration.md
    - Database Integration: user-guide/database-integration.md
  - API Reference:
    - Overview: api/index.md
    - GraphIDMaker: api/maker.md
    - GraphIDGenerator: api/generator.md
    - DistanceClusteringGraphID: api/distance-clustering.md
    - Analysis Module: api/analysis.md
  - Examples:
    - Overview: examples/index.md
    - Machine Learning: examples/machine-learning.md
  - Development:
    - Contributing: development/contributing.md
    - Changelog: development/changelog.md

copyright: Copyright &copy; 2024-2026 Koki Muraoka
