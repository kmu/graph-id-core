name: Test

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [ '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake

    - name: Install Poetry
      run: pipx install poetry

    - name: Configure Poetry to use in-project virtualenv
      run: poetry config virtualenvs.in-project true

    - name: Cache Poetry dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: ${{ runner.os }}-poetry-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-${{ matrix.python-version }}-
          ${{ runner.os }}-poetry-

    - name: Install dependencies
      run: poetry install --no-root

    - name: Build C++ extension with CMake
      shell: bash
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release --parallel

    - name: Copy built extension into importable locations
      shell: bash
      run: |
        # On MSVC the extension is emitted under build/Release; on Unix Makefiles
        # it lands directly in build/. Place it at the repo root (top-level
        # `import graph_id_cpp`) and in build/ (tests/cpp/imports.py adds build/).
        exts=$(find build -name "graph_id_cpp*.so" -o -name "graph_id_cpp*.pyd")
        echo "Built extension(s):"
        echo "$exts"
        for f in $exts; do
          cp -f "$f" .
          cp -f "$f" build/ 2>/dev/null || true
        done

    - name: Check built files
      shell: bash
      run: |
        find . build -maxdepth 2 -name "graph_id_cpp*" 2>/dev/null || true
        poetry run python -c "import sys; print('Python path:', sys.path)"

    - name: Run pytest
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        poetry run pytest --cov --cov-report=xml --cov-report=term --junitxml=junit.xml -o junit_family=legacy -v -n auto

    - name: Upload coverage reports to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: kmu/graph-id-core
        files: ./coverage.xml

    - name: Upload test results to Codecov
      if: matrix.os == 'ubuntu-latest' && !cancelled()
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./junit.xml
