name: Test

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [ '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake

    - name: Install Poetry
      run: pipx install poetry

    - name: Configure Poetry to use in-project virtualenv
      run: poetry config virtualenvs.in-project true

    - name: Cache Poetry dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: ${{ runner.os }}-poetry-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-${{ matrix.python-version }}-
          ${{ runner.os }}-poetry-

    - name: Install dependencies
      run: |
        # Build the C++ extension manually below, so skip building the project here.
        poetry install --no-root
        # setuptools is no longer bundled in Python 3.12+ venvs but is imported at
        # pytest startup on Windows (and is used by build.py).
        poetry run pip install setuptools

    - name: Build C++ extension with CMake
      shell: bash
      run: |
        # VERSION_INFO must be non-empty: TO_LITERAL(VERSION_INFO) stringifies it,
        # and MSVC rejects the empty function-like macro invocation an empty value
        # produces (GCC/Clang tolerate it).
        version=$(poetry version -s)
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DVERSION_INFO="$version"
        cmake --build . --config Release --parallel

    - name: Copy built extension into importable locations
      shell: bash
      run: |
        # MSVC emits the extension under build/Release; Unix Makefiles put it in
        # build/. Place it at the repo root (top-level `import graph_id_cpp`) and
        # in build/ (tests/cpp/imports.py adds build/ to sys.path).
        exts=$(find build -name "graph_id_cpp*.so" -o -name "graph_id_cpp*.pyd")
        echo "Built extension(s):"
        echo "$exts"
        for f in $exts; do
          cp -f "$f" .
          cp -f "$f" build/ 2>/dev/null || true
        done

    - name: Check built files
      shell: bash
      run: |
        find . build -maxdepth 2 -name "graph_id_cpp*" 2>/dev/null || true
        poetry run python -c "import sys; print('Python path:', sys.path)"

    - name: Run pytest
      env:
        PYTHONPATH: ${{ github.workspace }}
      # pytest-xdist worker subprocesses fail to import the venv's setuptools on
      # Windows, so disable distribution there (-n 0); keep it elsewhere (-n auto).
      run: |
        poetry run python -m pytest --cov --cov-report=xml --cov-report=term --junitxml=junit.xml -o junit_family=legacy -v -n ${{ matrix.os == 'windows-latest' && '0' || 'auto' }}

    - name: Upload coverage reports to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: kmu/graph-id-core
        files: ./coverage.xml

    - name: Upload test results to Codecov
      if: matrix.os == 'ubuntu-latest' && !cancelled()
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./junit.xml
